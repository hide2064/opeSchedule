services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://opeschedule:opeschedule@db:5432/opeschedule
      APP_ENV: development
      CORS_ORIGINS: http://localhost:8000
      LOG_LEVEL: info
    depends_on:
      db:
        condition: service_healthy
    # ホットリロード用: backend/ をコンテナにマウント
    volumes:
      - ./backend:/app/backend
      - ./frontend:/app/frontend
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: opeschedule
      POSTGRES_PASSWORD: opeschedule
      POSTGRES_DB: opeschedule
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U opeschedule"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
