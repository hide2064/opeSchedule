<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>opeSchedule</title>
  <link rel="stylesheet" href="css/main.css" />
</head>
<body>

<!-- ── ヘッダー ──────────────────────────────────────────── -->
<header class="app-header">
  <div class="app-header__brand">
    <span class="app-header__logo">📅</span>
    <span class="app-header__title">opeSchedule</span>
  </div>
</header>

<!-- ── Top ナビゲーション ────────────────────────────────── -->
<nav class="top-nav">
  <button class="top-nav__item active" data-panel="top-panel-projects">
    <span class="top-nav__icon">📁</span>
    <span class="top-nav__text">
      <span class="top-nav__label">Projects</span>
      <span class="top-nav__desc">プロジェクト一覧</span>
    </span>
  </button>
  <button class="top-nav__item" data-panel="top-panel-config">
    <span class="top-nav__icon">⚙️</span>
    <span class="top-nav__text">
      <span class="top-nav__label">Global Config</span>
      <span class="top-nav__desc">表示・テーマ設定</span>
    </span>
  </button>
  <button class="top-nav__item" data-panel="top-panel-debug">
    <span class="top-nav__icon">🪲</span>
    <span class="top-nav__text">
      <span class="top-nav__label">Debug Log</span>
      <span class="top-nav__desc">実行ログ確認</span>
    </span>
  </button>
</nav>

<!-- ── Top 画面 ──────────────────────────────────────────── -->
<main class="screen top-screen">

  <!-- Projects パネル（デフォルト表示） -->
  <section class="panel" id="top-panel-projects">
    <div class="panel__header">
      <h2 class="panel__title">Projects</h2>
      <div style="display:flex;gap:8px;align-items:center">
        <label class="btn btn--secondary btn--file">
          Import
          <input type="file" id="import-file" accept=".json,.csv" hidden />
        </label>
        <button class="btn btn--primary" id="btn-new-project">+ New Project</button>
      </div>
    </div>
    <div id="project-list" class="project-list">
      <div class="loading">読み込み中...</div>
    </div>
    <label class="toggle-archived">
      <input type="checkbox" id="chk-show-archived" />
      アーカイブ済みを表示
    </label>
  </section>

  <!-- Global Config パネル（メニューから表示） -->
  <section class="panel top-panel--narrow" id="top-panel-config" hidden>
    <div class="panel__header">
      <h2 class="panel__title">Global Config</h2>
    </div>
    <form id="config-form" class="config-form">
      <div class="form-row">
        <label class="form-label">週の開始曜日</label>
        <select name="week_start_day" class="form-select">
          <option value="Mon">月曜日 (Mon)</option>
          <option value="Sun">日曜日 (Sun)</option>
          <option value="Sat">土曜日 (Sat)</option>
        </select>
      </div>
      <div class="form-row">
        <label class="form-label">デフォルト表示</label>
        <select name="default_view_mode" class="form-select">
          <option value="Day">Day</option>
          <option value="Week">Week</option>
          <option value="Month">Month</option>
          <option value="Quarter">Quarter</option>
        </select>
      </div>
      <div class="form-row">
        <label class="form-label">日付フォーマット</label>
        <select name="date_format" class="form-select">
          <option value="YYYY-MM-DD">YYYY-MM-DD</option>
          <option value="MM/DD/YYYY">MM/DD/YYYY</option>
          <option value="DD/MM/YYYY">DD/MM/YYYY</option>
        </select>
      </div>
      <div class="form-row">
        <label class="form-label">タイムゾーン</label>
        <select name="timezone" class="form-select">
          <option value="Asia/Tokyo">Asia/Tokyo (JST)</option>
          <option value="UTC">UTC</option>
          <option value="America/New_York">America/New_York (ET)</option>
          <option value="Europe/London">Europe/London (GMT)</option>
        </select>
      </div>
      <div class="form-row">
        <label class="form-label">テーマ</label>
        <select name="theme" class="form-select">
          <option value="light">Light</option>
          <option value="dark">Dark</option>
        </select>
      </div>
      <div class="form-row form-row--checkbox">
        <label class="form-label">
          <input type="checkbox" name="highlight_weekends" />
          週末をハイライト
        </label>
      </div>
      <div class="form-row form-row--checkbox">
        <label class="form-label">
          <input type="checkbox" name="auto_scroll_today" />
          今日に自動スクロール
        </label>
      </div>
      <div class="form-actions">
        <button type="submit" class="btn btn--primary">Save Config</button>
        <span class="save-msg" id="config-save-msg"></span>
      </div>
    </form>
  </section>

  <!-- Debug Log パネル（メニューから表示） -->
  <section class="panel" id="top-panel-debug" hidden>
    <div class="panel__header">
      <h2 class="panel__title" style="font-family:monospace">🪲 Debug Log</h2>
      <div style="display:flex;gap:8px">
        <button class="btn btn--secondary" id="btn-log-clear" style="font-size:12px">Clear</button>
        <button class="btn btn--secondary" id="btn-log-copy"  style="font-size:12px">Copy</button>
      </div>
    </div>
    <div id="debug-log"
         style="font-family:monospace;font-size:12px;line-height:1.6;
                max-height:480px;overflow-y:auto;
                background:var(--color-bg);border:1px solid var(--color-border);
                border-radius:4px;padding:8px;white-space:pre-wrap;word-break:break-all">
      <span style="color:var(--color-text-muted)">-- ページ読み込み中 --</span>
    </div>
  </section>

</main>

<!-- ── Project モーダル ───────────────────────────────────── -->
<div id="project-modal" class="modal" hidden>
  <div class="modal__backdrop"></div>
  <div class="modal__box">
    <div class="modal__header">
      <h3 class="modal__title" id="project-modal-title">New Project</h3>
      <button class="btn-icon" id="btn-close-project-modal">✕</button>
    </div>
    <form id="project-modal-form" class="task-form">
      <input type="hidden" name="project_id" />
      <div class="form-row">
        <label class="form-label">プロジェクト名 <span class="required">*</span></label>
        <input type="text" name="name" class="form-input" required />
      </div>
      <div class="form-row">
        <label class="form-label">説明</label>
        <textarea name="description" class="form-textarea" rows="2"></textarea>
      </div>
      <div class="form-row">
        <label class="form-label">色</label>
        <input type="color" name="color" class="form-color" value="#4A90D9" />
      </div>
      <div class="form-row">
        <label class="form-label">プロジェクトステータス</label>
        <select name="project_status" class="form-select">
          <option value="未開始">未開始</option>
          <option value="作業中">作業中</option>
          <option value="中断">中断</option>
          <option value="終了">終了</option>
        </select>
      </div>
      <div class="form-row">
        <label class="form-label">客先</label>
        <input type="text" name="client_name" class="form-input" placeholder="例: 株式会社○○" />
      </div>
      <div class="form-row">
        <label class="form-label">ベースプロジェクト</label>
        <input type="text" name="base_project" class="form-input" placeholder="例: 基幹システム v2" />
      </div>
      <div class="form-row">
        <label class="form-label">デフォルト表示 (空=グローバル設定)</label>
        <select name="view_mode" class="form-select">
          <option value="">グローバル設定を使用</option>
          <option value="Day">Day</option>
          <option value="Week">Week</option>
          <option value="Month">Month</option>
          <option value="Quarter">Quarter</option>
        </select>
      </div>
      <div id="copy-section" class="copy-section" hidden>
        <div class="copy-section__divider">📋 プロジェクトをコピー</div>
        <div class="form-row">
          <label class="form-label">コピー元プロジェクト</label>
          <select name="copy_source_id" id="copy-source-id" class="form-select">
            <option value="">-- コピーしない --</option>
          </select>
        </div>
        <div id="copy-anchor-section" hidden>
          <div class="form-row">
            <label class="form-label">日程の基準</label>
            <div class="radio-group">
              <label class="radio-label">
                <input type="radio" name="copy_anchor_type" value="start" checked />
                開始日に合わせる
              </label>
              <label class="radio-label">
                <input type="radio" name="copy_anchor_type" value="end" />
                終了日に合わせる
              </label>
            </div>
          </div>
          <div class="form-row">
            <label class="form-label">基準日 <span class="required">*</span></label>
            <input type="date" name="copy_anchor_date" id="copy-anchor-date" class="form-input" />
          </div>
        </div>
      </div>
      <div class="form-actions">
        <button type="submit" class="btn btn--primary" id="project-modal-submit-btn">Save</button>
      </div>
    </form>
  </div>
</div>

<!-- ── Toast 通知 ─────────────────────────────────────────── -->
<div id="toast" class="toast" hidden></div>

<script>
// console をインターセプトしてログパネルに表示（モジュール読み込み前に設定）
(function() {
  const _orig = { log: console.log, warn: console.warn, error: console.error };
  const entries = [];

  function appendLog(level, args) {
    const time = new Date().toISOString().slice(11, 23);
    const text = args.map(a => {
      if (a === null) return 'null';
      if (a === undefined) return 'undefined';
      if (a instanceof Error) return a.stack || String(a);
      if (typeof a === 'object') { try { return JSON.stringify(a, null, 0); } catch { return String(a); } }
      return String(a);
    }).join(' ');
    entries.push({ level, time, text });

    const el = document.getElementById('debug-log');
    if (!el) return;
    if (entries.length === 1) el.innerHTML = ''; // 初期メッセージを消去

    const line = document.createElement('div');
    const colors = { log: '#2c3e50', warn: '#e67e22', error: '#e74c3c' };
    const labels = { log: 'INFO ', warn: 'WARN ', error: 'ERROR' };
    line.style.color = colors[level] || '#2c3e50';
    line.style.borderBottom = '1px solid rgba(0,0,0,.05)';
    line.style.padding = '1px 0';
    line.textContent = `[${time}] ${labels[level]} ${text}`;
    el.appendChild(line);
    el.scrollTop = el.scrollHeight;
  }

  console.log   = function(...a) { _orig.log(...a);   appendLog('log',   a); };
  console.warn  = function(...a) { _orig.warn(...a);  appendLog('warn',  a); };
  console.error = function(...a) { _orig.error(...a); appendLog('error', a); };

  // 未捕捉エラーもキャッチ
  window.addEventListener('error', ev => {
    appendLog('error', [`UncaughtError: ${ev.message} (${ev.filename}:${ev.lineno})`]);
  });
  window.addEventListener('unhandledrejection', ev => {
    appendLog('error', [`UnhandledRejection: ${ev.reason}`]);
  });

  // Clear / Copy ボタン
  document.addEventListener('DOMContentLoaded', () => {
    document.getElementById('btn-log-clear')?.addEventListener('click', () => {
      const el = document.getElementById('debug-log');
      if (el) { el.innerHTML = ''; entries.length = 0; }
    });
    document.getElementById('btn-log-copy')?.addEventListener('click', () => {
      const text = entries.map(e => `[${e.time}] ${e.level.toUpperCase().padEnd(5)} ${e.text}`).join('\n');
      navigator.clipboard.writeText(text).catch(() => {});
    });
  });
})();
</script>

<!-- ── Top ナビゲーション切り替え ────────────────────────── -->
<script>
(function() {
  const PANELS = ['top-panel-projects', 'top-panel-config', 'top-panel-debug'];

  function switchPanel(targetId) {
    PANELS.forEach(id => {
      const el = document.getElementById(id);
      if (el) el.hidden = (id !== targetId);
    });
    document.querySelectorAll('.top-nav__item').forEach(btn => {
      btn.classList.toggle('active', btn.dataset.panel === targetId);
    });
  }

  document.addEventListener('DOMContentLoaded', () => {
    document.querySelectorAll('.top-nav__item').forEach(btn => {
      btn.addEventListener('click', () => switchPanel(btn.dataset.panel));
    });
  });
})();
</script>

<script type="module" src="js/app.js"></script>
</body>
</html>
