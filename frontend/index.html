<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>opeSchedule</title>
  <link rel="stylesheet" href="css/main.css" />
</head>
<body>

<!-- ── ヘッダー ──────────────────────────────────────────── -->
<header class="app-header">
  <div class="app-header__brand">
    <span class="app-header__logo">📅</span>
    <span class="app-header__title">opeSchedule</span>
  </div>
</header>

<!-- ── Top 画面 ──────────────────────────────────────────── -->
<main class="screen">

  <section class="panel">
    <div class="panel__header">
      <h2 class="panel__title">Projects</h2>
      <button class="btn btn--primary" id="btn-new-project">+ New Project</button>
    </div>
    <div id="project-list" class="project-list">
      <div class="loading">読み込み中...</div>
    </div>
    <label class="toggle-archived">
      <input type="checkbox" id="chk-show-archived" />
      アーカイブ済みを表示
    </label>
  </section>

  <section class="panel">
    <div class="panel__header">
      <h2 class="panel__title">Global Config</h2>
    </div>
    <form id="config-form" class="config-form">
      <div class="form-row">
        <label class="form-label">週の開始曜日</label>
        <select name="week_start_day" class="form-select">
          <option value="Mon">月曜日 (Mon)</option>
          <option value="Sun">日曜日 (Sun)</option>
          <option value="Sat">土曜日 (Sat)</option>
        </select>
      </div>
      <div class="form-row">
        <label class="form-label">デフォルト表示</label>
        <select name="default_view_mode" class="form-select">
          <option value="Day">Day</option>
          <option value="Week">Week</option>
          <option value="Month">Month</option>
          <option value="Quarter">Quarter</option>
        </select>
      </div>
      <div class="form-row">
        <label class="form-label">日付フォーマット</label>
        <select name="date_format" class="form-select">
          <option value="YYYY-MM-DD">YYYY-MM-DD</option>
          <option value="MM/DD/YYYY">MM/DD/YYYY</option>
          <option value="DD/MM/YYYY">DD/MM/YYYY</option>
        </select>
      </div>
      <div class="form-row">
        <label class="form-label">タイムゾーン</label>
        <select name="timezone" class="form-select">
          <option value="Asia/Tokyo">Asia/Tokyo (JST)</option>
          <option value="UTC">UTC</option>
          <option value="America/New_York">America/New_York (ET)</option>
          <option value="Europe/London">Europe/London (GMT)</option>
        </select>
      </div>
      <div class="form-row">
        <label class="form-label">テーマ</label>
        <select name="theme" class="form-select">
          <option value="light">Light</option>
          <option value="dark">Dark</option>
        </select>
      </div>
      <div class="form-row form-row--checkbox">
        <label class="form-label">
          <input type="checkbox" name="highlight_weekends" />
          週末をハイライト
        </label>
      </div>
      <div class="form-row form-row--checkbox">
        <label class="form-label">
          <input type="checkbox" name="auto_scroll_today" />
          今日に自動スクロール
        </label>
      </div>
      <div class="form-actions">
        <button type="submit" class="btn btn--primary">Save Config</button>
        <span class="save-msg" id="config-save-msg"></span>
      </div>
    </form>
  </section>

</main>

<!-- ── Project モーダル ───────────────────────────────────── -->
<div id="project-modal" class="modal" hidden>
  <div class="modal__backdrop"></div>
  <div class="modal__box">
    <div class="modal__header">
      <h3 class="modal__title" id="project-modal-title">New Project</h3>
      <button class="btn-icon" id="btn-close-project-modal">✕</button>
    </div>
    <form id="project-modal-form" class="task-form">
      <input type="hidden" name="project_id" />
      <div class="form-row">
        <label class="form-label">プロジェクト名 <span class="required">*</span></label>
        <input type="text" name="name" class="form-input" required />
      </div>
      <div class="form-row">
        <label class="form-label">説明</label>
        <textarea name="description" class="form-textarea" rows="2"></textarea>
      </div>
      <div class="form-row">
        <label class="form-label">色</label>
        <input type="color" name="color" class="form-color" value="#4A90D9" />
      </div>
      <div class="form-row">
        <label class="form-label">デフォルト表示 (空=グローバル設定)</label>
        <select name="view_mode" class="form-select">
          <option value="">グローバル設定を使用</option>
          <option value="Day">Day</option>
          <option value="Week">Week</option>
          <option value="Month">Month</option>
          <option value="Quarter">Quarter</option>
        </select>
      </div>
      <div class="form-actions">
        <button type="submit" class="btn btn--primary">Save</button>
      </div>
    </form>
  </div>
</div>

<!-- ── Toast 通知 ─────────────────────────────────────────── -->
<div id="toast" class="toast" hidden></div>

<script type="module" src="js/app.js"></script>
</body>
</html>
