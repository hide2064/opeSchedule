<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>opeSchedule - Schedule</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/frappe-gantt@0.6.1/dist/frappe-gantt.css" />
  <link rel="stylesheet" href="css/main.css" />
  <link rel="stylesheet" href="css/gantt-overrides.css" />
</head>
<body>

<!-- ── Debug Log インターセプター（最初に設置） ──────────── -->
<script>
(function() {
  const _orig = { log: console.log, warn: console.warn, error: console.error };
  const entries = [];

  function appendLog(level, args) {
    const time = new Date().toISOString().slice(11, 23);
    const text = args.map(a => {
      if (a === null) return 'null';
      if (a === undefined) return 'undefined';
      if (a instanceof Error) return a.stack || String(a);
      if (typeof a === 'object') { try { return JSON.stringify(a, null, 0); } catch { return String(a); } }
      return String(a);
    }).join(' ');
    entries.push({ level, time, text });

    const el = document.getElementById('debug-log');
    if (!el) return;
    if (entries.length === 1) el.innerHTML = '';

    const line = document.createElement('div');
    const colors = { log: 'var(--color-text,#2c3e50)', warn: '#e67e22', error: '#e74c3c' };
    const labels = { log: 'INFO ', warn: 'WARN ', error: 'ERROR' };
    line.style.color = colors[level] || 'var(--color-text,#2c3e50)';
    line.style.borderBottom = '1px solid rgba(0,0,0,.05)';
    line.style.padding = '1px 0';
    line.textContent = `[${time}] ${labels[level]} ${text}`;
    el.appendChild(line);
    el.scrollTop = el.scrollHeight;
  }

  console.log   = function(...a) { _orig.log(...a);   appendLog('log',   a); };
  console.warn  = function(...a) { _orig.warn(...a);  appendLog('warn',  a); };
  console.error = function(...a) { _orig.error(...a); appendLog('error', a); };

  window.addEventListener('error', ev => {
    appendLog('error', [`UncaughtError: ${ev.message} (${ev.filename}:${ev.lineno})`]);
  });
  window.addEventListener('unhandledrejection', ev => {
    appendLog('error', [`UnhandledRejection: ${ev.reason}`]);
  });

  document.addEventListener('DOMContentLoaded', () => {
    document.getElementById('btn-log-clear')?.addEventListener('click', () => {
      const el = document.getElementById('debug-log');
      if (el) { el.innerHTML = ''; entries.length = 0; }
    });
    document.getElementById('btn-log-copy')?.addEventListener('click', () => {
      const text = entries.map(e => `[${e.time}] ${e.level.toUpperCase().padEnd(5)} ${e.text}`).join('\n');
      navigator.clipboard.writeText(text).catch(() => {});
    });
  });
})();
</script>

<!-- ── ヘッダー ──────────────────────────────────────────── -->
<header class="app-header">
  <div class="app-header__brand">
    <a href="/" class="btn btn--secondary btn--back">← Top</a>
    <span class="app-header__logo">📅</span>
    <span class="app-header__title">opeSchedule</span>
    <span class="schedule-header__project-name" id="schedule-project-name">読み込み中...</span>
  </div>
  <div class="schedule-header__center">
    <div class="view-mode-btns" id="view-mode-btns">
      <button class="view-btn" data-mode="Day">Day</button>
      <button class="view-btn active" data-mode="Week">Week</button>
      <button class="view-btn" data-mode="Month">Month</button>
      <button class="view-btn" data-mode="Quarter">Quarter</button>
    </div>
  </div>
  <div class="schedule-header__right">
    <label class="btn btn--secondary btn--file">
      Import
      <input type="file" id="import-file" accept=".json,.csv" hidden />
    </label>
    <button class="btn btn--secondary" id="btn-export-json">Export JSON</button>
    <button class="btn btn--secondary" id="btn-export-csv">Export CSV</button>
    <button class="btn btn--primary" id="btn-add-task">+ Add Task</button>
  </div>
</header>

<!-- ── Gantt チャート表示エリア ──────────────────────────── -->
<div id="gantt-container" class="gantt-container">
  <div class="loading">読み込み中...</div>
</div>

<!-- ── タスク詳細パネル ───────────────────────────────────── -->
<div id="task-detail-panel" class="task-detail-panel" hidden>
  <div class="task-detail-panel__header">
    <h3 class="task-detail-panel__title">Task Detail</h3>
    <button class="btn-icon" id="btn-close-detail">✕</button>
  </div>
  <form id="task-detail-form" class="task-form">
    <input type="hidden" name="task_id" />
    <div class="form-row">
      <label class="form-label">大項目</label>
      <input type="text" name="category_large" class="form-input" placeholder="例: Phase1" />
    </div>
    <div class="form-row">
      <label class="form-label">中項目</label>
      <input type="text" name="category_medium" class="form-input" placeholder="例: 設計" />
    </div>
    <div class="form-row">
      <label class="form-label">小項目（タスク名） <span class="required">*</span></label>
      <input type="text" name="name" class="form-input" required />
    </div>
    <div class="form-row form-row--checkbox">
      <label class="form-label">
        <input type="checkbox" name="is_milestone" id="detail-is-milestone" />
        マイルストーン（1日）
      </label>
    </div>
    <div class="form-row">
      <label class="form-label">開始日 <span class="required">*</span></label>
      <input type="date" name="start_date" class="form-input" required />
    </div>
    <div class="form-row" id="detail-end-date-row">
      <label class="form-label">終了日 <span class="required">*</span></label>
      <input type="date" name="end_date" class="form-input" required />
    </div>
    <div class="form-row">
      <label class="form-label">進捗 (<span id="detail-progress-val">0</span>%)</label>
      <input type="range" name="progress" min="0" max="100" value="0" class="form-range"
             oninput="document.getElementById('detail-progress-val').textContent=this.value" />
    </div>
    <div class="form-row">
      <label class="form-label">色</label>
      <input type="color" name="color" class="form-color" value="#4A90D9" />
    </div>
    <div class="form-row">
      <label class="form-label">メモ</label>
      <textarea name="notes" class="form-textarea" rows="3"></textarea>
    </div>
    <div class="form-actions">
      <button type="submit" class="btn btn--primary">Save</button>
      <button type="button" class="btn btn--danger" id="btn-delete-task">Delete</button>
      <span class="save-msg" id="task-save-msg"></span>
    </div>
  </form>
</div>

<!-- ── Add Task モーダル ──────────────────────────────────── -->
<div id="add-task-modal" class="modal" hidden>
  <div class="modal__backdrop"></div>
  <div class="modal__box">
    <div class="modal__header">
      <h3 class="modal__title">Add Task</h3>
      <button class="btn-icon" id="btn-close-add-task-modal">✕</button>
    </div>
    <form id="add-task-form" class="task-form">
      <div class="form-row">
        <label class="form-label">大項目</label>
        <input type="text" name="category_large" class="form-input" placeholder="例: Phase1" />
      </div>
      <div class="form-row">
        <label class="form-label">中項目</label>
        <input type="text" name="category_medium" class="form-input" placeholder="例: 設計" />
      </div>
      <div class="form-row">
        <label class="form-label">小項目（タスク名） <span class="required">*</span></label>
        <input type="text" name="name" class="form-input" required />
      </div>
      <div class="form-row form-row--checkbox">
        <label class="form-label">
          <input type="checkbox" name="is_milestone" id="add-is-milestone" />
          マイルストーン（1日）
        </label>
      </div>
      <div class="form-row">
        <label class="form-label">開始日 <span class="required">*</span></label>
        <input type="date" name="start_date" class="form-input" required />
      </div>
      <div class="form-row" id="add-end-date-row">
        <label class="form-label">終了日 <span class="required">*</span></label>
        <input type="date" name="end_date" class="form-input" required />
      </div>
      <div class="form-row">
        <label class="form-label">色</label>
        <input type="color" name="color" class="form-color" value="#4A90D9" />
      </div>
      <div class="form-row">
        <label class="form-label">メモ</label>
        <textarea name="notes" class="form-textarea" rows="2"></textarea>
      </div>
      <div class="form-actions">
        <button type="submit" class="btn btn--primary">Add</button>
      </div>
    </form>
  </div>
</div>

<!-- ── Debug Log Panel ────────────────────────────────────── -->
<section class="screen" style="padding-top:0">
  <div class="panel" id="debug-panel">
    <div class="panel__header">
      <h2 class="panel__title" style="font-family:monospace">🪲 Debug Log</h2>
      <div style="display:flex;gap:8px">
        <button class="btn btn--secondary" id="btn-log-clear" style="font-size:12px">Clear</button>
        <button class="btn btn--secondary" id="btn-log-copy"  style="font-size:12px">Copy</button>
      </div>
    </div>
    <div id="debug-log"
         style="font-family:monospace;font-size:12px;line-height:1.6;
                max-height:320px;overflow-y:auto;
                background:var(--color-bg);border:1px solid var(--color-border);
                border-radius:4px;padding:8px;white-space:pre-wrap;word-break:break-all">
      <span style="color:var(--color-text-muted)">-- ページ読み込み中 --</span>
    </div>
  </div>
</section>

<!-- ── Toast 通知 ─────────────────────────────────────────── -->
<div id="toast" class="toast" hidden></div>

<script src="https://cdn.jsdelivr.net/npm/frappe-gantt@0.6.1/dist/frappe-gantt.min.js"
        onerror="console.error('CDN読み込み失敗: frappe-gantt.min.js が取得できません。インターネット接続またはCDNを確認してください。')"></script>
<script type="module" src="js/schedule-screen.js"></script>
</body>
</html>
